<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks — FocusFeed</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<nav class="navbar">
  <div class="container">
    <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu"><img src="/icons/menu.svg" alt="menu"></button>
    <a href="/dashboard.html" class="navbar-brand">Focus<span>Feed</span></a>
    <div class="navbar-links">
      <div id="nav-user-avatar" class="sidebar-avatar">U</div>
    </div>
  </div>
</nav>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-label">Menu</div>
      <a href="/dashboard.html" class="sidebar-link"><span class="link-icon"><img src="/icons/laptop.svg" class="svg-icon svg-icon-sm" alt=""></span> My Feed</a>
      <a href="/bookmarks.html" class="sidebar-link active"><span class="link-icon"><img src="/icons/bookmark.svg" class="svg-icon svg-icon-sm" alt=""></span> Bookmarks</a>
      <a href="/profile.html"   class="sidebar-link"><span class="link-icon"><img src="/icons/person.svg" class="svg-icon svg-icon-sm" alt=""></span> Profile</a>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-user-info" onclick="window.location.href='/profile.html'">
        <div class="sidebar-avatar">U</div>
        <div>
          <div class="sidebar-user-name" id="nav-user-name">User</div>
          <div class="sidebar-user-email">View Profile</div>
        </div>
      </div>
      <button onclick="Auth.logout()" class="sidebar-link" style="width:100%;margin-top:6px">
        <span class="link-icon"><img src="/icons/door.svg" class="svg-icon svg-icon-sm" alt=""></span> Sign Out
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Bookmarks</h1>
        <p class="page-subtitle"><span id="bookmark-count">0</span> saved articles</p>
      </div>
    </div>
    <div class="bookmarks-grid" id="bookmarks-grid">
      <div class="spinner"></div>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/bookmark.js"></script>
<script>initBookmarksPage();</script>

<nav class="bottom-nav">
  <div class="bottom-nav-items">
    <a href="/dashboard.html" class="bottom-nav-item "><img src="/icons/laptop.svg" alt="feed">Feed</a>
    <a href="/bookmarks.html" class="bottom-nav-item active"><img src="/icons/bookmark.svg" alt="">Saved</a>
    <a href="/profile.html"   class="bottom-nav-item "><img src="/icons/person.svg" alt="">Profile</a>
    <a href="/interests.html" class="bottom-nav-item "><img src="/icons/arrow.svg" alt="">Interests</a>
  </div>
</nav>

<script>
(function(){
  var btn = document.getElementById('hamburger-btn');
  var sidebar = document.querySelector('.sidebar, .admin-sidebar');
  var overlay = document.getElementById('sidebar-overlay');
  function open(){ sidebar&&sidebar.classList.add('open'); overlay&&overlay.classList.add('active'); document.body.style.overflow='hidden'; }
  function close(){ sidebar&&sidebar.classList.remove('open'); overlay&&overlay.classList.remove('active'); document.body.style.overflow=''; }
  btn&&btn.addEventListener('click',function(){ sidebar&&sidebar.classList.contains('open')?close():open(); });
  overlay&&overlay.addEventListener('click', close);
  sidebar&&sidebar.querySelectorAll('a,button').forEach(function(el){ el.addEventListener('click',function(){ if(window.innerWidth<=1024)close(); }); });
})();
</script>

</body>
</html>
