<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — FocusFeed</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
<div class="auth-page">

  <!-- Left Branding Panel -->
  <div class="auth-panel-left">
    <a href="/" class="auth-brand">Focus<span>Feed</span></a>
    <p class="auth-tagline">Your personalized news experience. Real stories, real interests, real time.</p>
    <div class="auth-features">
      <div class="auth-feature"><div class="auth-feature-icon">🎯</div>Interest-based personalization</div>
      <div class="auth-feature"><div class="auth-feature-icon">⚡</div>Real-time news from trusted sources</div>
      <div class="auth-feature"><div class="auth-feature-icon">🔖</div>Bookmark & read later</div>
      <div class="auth-feature"><div class="auth-feature-icon">🌍</div>Multi-language support</div>
    </div>
  </div>

  <!-- Right Form Panel -->
  <div class="auth-panel-right">
    <div class="auth-form-box">
      <h2>Welcome back</h2>
      <p class="auth-subtitle">Sign in to your FocusFeed account</p>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-group">
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="input-toggle" tabindex="-1">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Sign In</button>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-switch">
        Don't have an account? <a href="/signup.html">Create one free</a>
      </div>
    </div>
  </div>

</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/auth.js"></script>
<script>initLoginPage();</script>
</body>
</html>
